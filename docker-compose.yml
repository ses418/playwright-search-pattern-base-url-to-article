version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: playwright-search-service
    ports:
      - "5070:5070"
    env_file:
      - .env
    # Increase shared memory to prevent browser crashes
    shm_size: "1gb"
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
    # Restart policy
    restart: unless-stopped
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5070/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
